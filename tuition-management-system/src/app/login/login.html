<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>ITCS College</mat-card-title>
      <mat-card-subtitle>Student Tuition Management Portal</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input
            matInput
            type="email"
            placeholder="student@itcs.edu"
            required
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            type="password"
            placeholder="Enter your password"
            required
          />
        </mat-form-field>

        <div class="options">
          <mat-checkbox>Remember Me</mat-checkbox>

          <a href="#" class="forgot-link">
            Forgot Password?
          </a>
        </div>

        <button
          mat-raised-button
          color="primary"
          class="full-width login-button"
        >
          Sign In
        </button>
      </form>
    </mat-card-content>

    <mat-divider></mat-divider>

    <mat-card-footer>
      <p class="footer-text">
        © 2026 ITCS College. All Rights Reserved.
      </p>
    </mat-card-footer>
  </mat-card>
</div>
